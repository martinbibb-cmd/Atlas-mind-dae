name: daedalus-runner

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    restart: unless-stopped
    depends_on:
      - health
    networks:
      - daedalus-private

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-daedalus}
      POSTGRES_USER: ${POSTGRES_USER:-daedalus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - daedalus-private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  health:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - daedalus-private

networks:
  daedalus-private:
    driver: bridge

volumes:
  postgres-data:
